version: '3.8'
services:
  twenty:
    image: twentycrm/twenty:latest
    ports:
      - "3000:3000"
    environment:
      - PG_DATABASE_URL=postgres://twenty:twenty@db:5432/twenty
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: twenty
      POSTGRES_DB: twenty
    volumes:
      - twenty_pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  twenty_pgdata:
